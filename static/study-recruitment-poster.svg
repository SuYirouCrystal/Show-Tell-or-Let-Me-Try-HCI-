  <text x="124" y="308" fill="#EAF0FF" font-family="Arial, Helvetica, sans-serif" font-size="34">How do different AI explanation styles affect decision-making and trust?</text>

  <text x="124" y="386" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">What you will do</text>
  <text x="124" y="434" fill="#EEF3FF" font-family="Arial, Helvetica, sans-serif" font-size="25">• Join a short Google Meet session</text>
  <text x="124" y="475" fill="#EEF3FF" font-family="Arial, Helvetica, sans-serif" font-size="25">• View our study screen and make product-choice decisions</text>
  <text x="124" y="516" fill="#EEF3FF" font-family="Arial, Helvetica, sans-serif" font-size="25">• Answer a few brief questions about the AI explanation</text>

  <text x="124" y="603" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Time commitment</text>
  <text x="124" y="646" fill="#EEF3FF" font-family="Arial, Helvetica, sans-serif" font-size="25">About 10 to 15 minutes</text>

  <text x="124" y="714" fill="white" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700">Sign up</text>
  <text x="124" y="756" fill="#D8FFEF" font-family="Arial, Helvetica, sans-serif" font-size="25">calendar.app.google/Hgw5zTBh3VB9ZzTE7</text>

